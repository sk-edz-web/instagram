<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta Chat - Instagram Analyzer</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #000; 
            margin: 0; 
            display: flex;
            justify-content: center;
        }
        .container { 
            width: 100%; 
            max-width: 450px; 
            background: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* Header Setup */
        .header { 
            display: flex; align-items: center; justify-content: flex-start; gap: 12px;
            padding: 10px 15px; border-bottom: 1px solid #dbdbdb; background: white;
            position: sticky; top: 0; z-index: 10;
        }
        .menu-btn {
            font-size: 24px; color: #262626; cursor: pointer; padding: 5px; 
            -webkit-tap-highlight-color: transparent;
        }
        .logo-container { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; margin-right: 34px;}
        .ig-icon { height: 32px; width: auto; }
        .ig-text { height: 50px; width: auto; object-fit: contain; margin-top: 4px; }
        
        /* Dynamic Menu Overlay Component */
        .menu-overlay {
            position: absolute; top: 71px; left: 0; width: 100%; height: calc(100% - 71px);
            background: rgba(0,0,0,0.4); z-index: 100; display: none;
        }
        .menu-content {
            width: 260px; height: 100%; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 20px 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px;
        }
        .menu-item-btn {
            display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px;
            background: #fafafa; border: 1px solid #dbdbdb; border-radius: 8px;
            font-size: 15px; font-weight: bold; color: #262626; cursor: pointer; text-align: left;
        }
        .menu-item-btn:active { background: #efefef; }
        
        /* Chat UI layout structure styling blocks */
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; background: white; display: flex; flex-direction: column;}
        .msg-wrapper { width: 100%; margin-bottom: 14px; display: flex; flex-direction: column; }
        .msg-wrapper.user-side { align-items: flex-end; }
        .msg-wrapper.ai-side { align-items: flex-start; }
        .ai-name-tag { font-size: 11px; color: #8e8e8e; margin-left: 36px; margin-bottom: 3px; font-weight: 600; }
        .ai-row { display: flex; align-items: flex-end; max-width: 85%; }
        .ai-icon { 
            width: 26px; height: 26px; border-radius: 50%; object-fit: contain; 
            margin-right: 10px; background: white; border: 1px solid #dbdbdb; padding: 2px; flex-shrink: 0;
        }
        .bubble { padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; word-wrap: break-word; max-width: 85%; }
        .msg-user-bubble { background: #3797f0; color: white; border-bottom-right-radius: 4px; max-width: 100%; }
        .msg-ai-bubble { background: #f1f1f1; color: #000; border-bottom-left-radius: 4px; }

        /* Typing animations framework CSS properties blocks */
        .typing-dots { display: flex; gap: 4px; align-items: center; height: 20px; padding: 0 4px;}
        .typing-dots span {
            width: 6px; height: 6px; background-color: #8e8e8e; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Lower Input Layout elements */
        .chat-input-area { 
            display: flex; padding: 12px 15px; border-top: 1px solid #dbdbdb; background: white; align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 12px);
        }
        .chat-input-area input { 
            flex: 1; border-radius: 24px; padding: 12px 16px; border: 1px solid #dbdbdb; 
            margin-right: 10px; font-size: 15px; background: #fafafa; outline: none;
        }
        .chat-input-area button { 
            background-color: transparent; color: #0095f6; border: none; font-weight: bold;
            padding: 10px; cursor: pointer; font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="menu-btn" onclick="toggleMenuOverlay()">☰</div>
            <div class="logo-container">
                <img class="ig-icon" src="https://cdn.iconscout.com/icon/free/png-512/free-instagram-logo-icon-svg-download-png-1583142.png?f=webp&w=256" alt="Icon">
                <img class="ig-text" src="https://imgs.search.brave.com/WtKLjCAUEZtbVub3Lj1Styk_lggX3X2e0f12WyAGekQ/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly8xMDAw/bG9nb3MubmV0L3dw/LWNvbnRlbnQvdXBs/b2Fkcy8yMDE3LzAy/L0luc3RhZ3JhbS1M/b2dvLTIwMTAtMjAx/My01MDB4MjgxLnBu/Zw" alt="Logo">
            </div>
        </div>

        <div class="menu-overlay" id="menuOverlay" onclick="toggleMenuOverlay()">
            <div class="menu-content" onclick="event.stopPropagation()">
                <button class="menu-item-btn" onclick="triggerMenuNewChat()">
                    <span>💬</span> New Chat Strategy
                </button>
            </div>
        </div>

        <div id="dashboard" style="display: flex; flex-direction: column; flex: 1;">
            <div class="chat-box" id="chatBox"></div>
            <div class="chat-input-area">
                <input type="text" id="userChatInput" placeholder="Message..." autocomplete="off">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="ai.js"></script>
</body>
</html>
